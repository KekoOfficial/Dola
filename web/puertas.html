<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puertas de Acceso</title>
    <style>
        :root {
            --fondo: #0f172a;
            --panel: #1e293b;
            --texto: #f8fafc;
            --titulo: #3b82f6;
            --acento: #2563eb;
            --exito: #16a34a;
            --alerta: #f59e0b;
            --gris: #475569;
            --borde: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            background-color: var(--fondo);
            color: var(--texto);
            padding: 20px 15px;
            line-height: 1.6;
        }

        .contenedor {
            max-width: 700px;
            margin: 0 auto;
            background-color: var(--panel);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--borde);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--titulo);
            font-weight: bold;
            font-size: 1.8rem;
        }

        .texto-info {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 25px;
            font-style: italic;
            font-size: 1.05rem;
        }

        .panel-puerta {
            background-color: rgba(59, 130, 246, 0.08);
            padding: 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid var(--acento);
        }

        .panel-puerta h3 {
            color: var(--texto);
            margin-bottom: 10px;
            font-size: 1.3rem;
            text-align: left;
        }

        .estado-abierta {
            color: var(--exito);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .estado-cerrada {
            color: var(--alerta);
            font-size: 1.1rem;
        }

        .btn {
            display: inline-block;
            padding: 12px 22px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 10px 0;
            font-size: 1rem;
            text-align: center;
            min-width: 120px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        .btn-accion {
            background-color: var(--acento);
            color: white;
        }

        .btn-accion:hover {
            background-color: #1d4ed8;
        }

        .btn-volver {
            background-color: var(--gris);
            color: white;
            width: 100%;
        }

        .btn-volver:hover {
            background-color: #334155;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h2>🚪 PUERTAS DE ACCESO</h2>
        <p class="texto-info">Cada puerta te da un multiplicador permanente</p>

        <div id="lista_puertas"></div>

        <a href="index.html" class="btn btn-volver">⬅️ Volver al menú</a>
    </div>

    <script src="/js/logica.js"></script>
</body>
</html>
