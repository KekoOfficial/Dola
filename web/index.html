<!DOCTYPE html>
<html lang="es">
<head>

<body>
    <div class="contenedor">
        <h1>🎮 JUEGO MULTIPLICADORES</h1>

        <div class="panel-estado">

        </div>

        <div class="navegacion">
            <a href="mejoras.html" class="btn btn-accion">🛠️ Mejoras</a>
