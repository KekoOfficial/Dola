<!-- 📁 Enlaces a archivos JS -->
<script type="module" src="js/utilidades.js"></script>
<script type="module" src="js/estado.js"></script>
<script type="module" src="js/cpu.js"></script>
<script type="module" src="js/multiplicadores.js"></script>
<script type="module" src="js/generadores.js"></script>
<script type="module" src="js/puertas.js"></script>
<script type="module" src="js/renacimiento.js"></script>
<script type="module" src="js/mejoras_pasivas.js"></script>
<script type="module" src="js/interfaz.js"></script>

<script type="module">
import { cargarEstado } from "./js/estado.js";
import { actualizarInterfaz } from "./js/interfaz.js";
import { comprar1CPU, comprarMaxCPU } from "./js/cpu.js";
import { comprar1Multiplicador, comprarMaxMultiplicadores } from "./js/multiplicadores.js";
import { comprarGenerador, comprarMaxGenerador } from "./js/generadores.js";
import { abrirPuerta } from "./js/puertas.js";
import { hacerRenacimiento } from "./js/renacimiento.js";
import { mejorarPasiva } from "./js/mejoras_pasivas.js";

// Exponer funciones para que los botones las encuentren
window.comprar1CPU = comprar1CPU;
window.comprarMaxCPU = comprarMaxCPU;
window.comprar1Multiplicador = comprar1Multiplicador;
window.comprarMaxMultiplicadores = comprarMaxMultiplicadores;
window.comprarGenerador = comprarGenerador;
window.comprarMaxGenerador = comprarMaxGenerador;
window.abrirPuerta = abrirPuerta;
window.hacerRenacimiento = hacerRenacimiento;
window.mejorarPasiva = mejorarPasiva;
window.irAPerfil = () => window.location.href = "/perfil";

// Actualización automática cada segundo
setInterval(async () => {
    await cargarEstado();
    actualizarInterfaz();
}, 1000);

// Cargar todo al abrir
window.onload = async () => {
    await cargarEstado();
    actualizarInterfaz();
};
</script>
