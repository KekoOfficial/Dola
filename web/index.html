<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplicadores de Dinero</title>
    <style>
        * {margin:0; padding:0; box-sizing:border-box; font-family:Arial;}
        body {background:#0f172a; color:#f8fafc; padding:20px; max-width:600px; margin:0 auto;}
        .cabecera {background:#1e293b; padding:15px; border-radius:10px; margin-bottom:20px; text-align:center;}
        .dinero {font-size:28px; font-weight:bold; color:#4ade80; margin:10px 0;}
        .ganancia {font-size:16px; color:#94a3b8;}
        .seccion {background:#1e293b; padding:15px; border-radius:10px; margin-bottom:15px;}
        button {width:100%; padding:12px; border:none; border-radius:8px; font-size:16px; font-weight:bold; cursor:pointer; margin:8px 0;}
        .btn-verde {background:#166534; color:white;}
        .btn-azul {background:#1e40af; color:white;}
        .btn-rojo {background:#991b1b; color:white;}
        input {width:100%; padding:10px; margin:8px 0; border-radius:6px; border:none; background:#334155; color:white;}
    </style>
</head>
<body>
    <div class="cabecera">
        <h2>💸 Juego Multiplicadores</h2>
        <div class="dinero" id="dinero">$0.00</div>
        <div class="ganancia">Ganancia: <span id="ganancia">0.00</span> $/seg</div>
    </div>

    <div class="seccion">
        <h3>🖥️ Mejorar CPU</h3>
        <p>Nivel: <span id="nivel_cpu">1</span> | Costo: $<span id="costo_cpu">150.00</span></p>
        <button class="btn-verde" onclick="mejorarCPU()">Comprar Mejora</button>
    </div>

    <div class="seccion">
        <h3>👤 Panel Administrador</h3>
        <input type="password" id="clave_admin" placeholder="Contraseña (111)">
        <input type="number" step="0.01" id="monto_admin" placeholder="Nueva cantidad de dinero">
        <button class="btn-rojo" onclick="cambiarDinero()">Actualizar Dinero</button>
    </div>

    <script>
        // ACTUALIZACIÓN AUTOMÁTICA CADA SEGUNDO
        async function actualizarDatos() {
            try {
                const res = await fetch("/api/estado");
                const datos = await res.json();
                document.getElementById("dinero").textContent = `$${datos.dinero.toFixed(2)}`;
                document.getElementById("nivel_cpu").textContent = datos.nivel_cpu;
                document.getElementById("costo_cpu").textContent = datos.costo_cpu.toFixed(2);
                
                // Calcular ganancia por segundo
                let base = datos.ganancia_cpu;
                for (const g of Object.values(datos.generadores)) base += g.cantidad * g.ganancia;
                let bono = datos.multiplicador_global * datos.bono_renacimiento;
                for (const l of Object.values(datos.logros)) if (l.desbloqueado) bono *= l.bono;
                document.getElementById("ganancia").textContent = (base * bono).toFixed(2);
            } catch (e) {
                console.log("Error al actualizar:", e);
            }
        }

        // Acciones
        async function mejorarCPU() {
            await fetch("/api/mejorar_cpu", {method:"POST"});
            actualizarDatos();
        }

        async function cambiarDinero() {
            const clave = document.getElementById("clave_admin").value.trim();
            const valor = parseFloat(document.getElementById("monto_admin").value) || 0;
            await fetch("/api/admin", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({clave, valor})
            });
            actualizarDatos();
        }

        // Iniciar actualización cada segundo
        actualizarDatos();
        setInterval(actualizarDatos, 1000);
    </script>
</body>
</html>
